defaults:
  - _self_
  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

hydra:
  run:
    dir: .
  output_subdir: null

documentation: |
  DNS Challenge Read Speech Audio Data Filtration Pipeline
  #########################################################

  This config processes the DNS Challenge Read Speech dataset (Track 1 Headset):
  https://github.com/microsoft/DNS-Challenge

  The dataset contains 14,279 clean read speech WAV files at 48kHz (19.3 hours total).
  Download size: 4.88 GB (compressed), extracted: 6.3 GB.

  **Auto-Download Support**:
  * **auto_download**: Automatically downloads and extracts dataset (default: true)
  * The pipeline will automatically download the dataset on first run

  **Required arguments**:
  * **raw_data_dir**: Directory where data will be downloaded to (if auto_download=true)
                      or directory containing read_speech WAV files (if auto_download=false)

raw_data_dir: ???
output_dir: ${raw_data_dir}/result

# 'batch' runs stages sequentially (works with any GPU/CPU count)
# 'streaming' runs stages concurrently (requires enough resources for all stages simultaneously)
execution_mode: streaming

max_samples: -1 # set to -1 to process all 14,279 files
auto_download: true

sample_rate: 48000
batch_size: 1

enable_vad: true
vad_min_duration_sec: 2.0
vad_max_duration_sec: 60.0
vad_threshold: 0.5
vad_min_interval_ms: 500
vad_speech_pad_ms: 300

enable_band_filter: true
band_value: full_band

enable_utmos: true
utmos_mos_threshold: 3.4

enable_sigmos: true
sigmos_noise_threshold: 4.0
sigmos_ovrl_threshold: 3.5

enable_speaker_separation: true
speaker_exclude_overlaps: true
speaker_min_duration: 0.8

processors:
  - _target_: nemo_curator.stages.audio.datasets.readspeech.CreateInitialManifestReadSpeechStage
    raw_data_dir: ${raw_data_dir}
    max_samples: ${max_samples}
    auto_download: ${auto_download}
    batch_size: ${batch_size}

  - _target_: nemo_curator.stages.audio.AudioDataFilterStage
    config:
      mono_conversion:
        output_sample_rate: ${sample_rate}
      vad:
        enable: ${enable_vad}
        min_duration_sec: ${vad_min_duration_sec}
        max_duration_sec: ${vad_max_duration_sec}
        threshold: ${vad_threshold}
        min_interval_ms: ${vad_min_interval_ms}
        speech_pad_ms: ${vad_speech_pad_ms}
      band_filter:
        enable: ${enable_band_filter}
        band_value: ${band_value}
      utmos:
        enable: ${enable_utmos}
        mos_threshold: ${utmos_mos_threshold}
      sigmos:
        enable: ${enable_sigmos}
        noise_threshold: ${sigmos_noise_threshold}
        ovrl_threshold: ${sigmos_ovrl_threshold}
      speaker_separation:
        enable: ${enable_speaker_separation}
        exclude_overlaps: ${speaker_exclude_overlaps}
        min_duration: ${speaker_min_duration}
      # Empty config uses _DEFAULT_PASSTHROUGH_KEYS which includes:
      #   speaker_id, num_speakers, speaking_duration, sample_rate,
      #   utmos_mos, sigmos_noise, sigmos_ovrl, sigmos_sig, sigmos_col,
      #   sigmos_disc, sigmos_loud, sigmos_reverb, band_prediction.
      # To restrict output columns, set passthrough_keys explicitly:
      #   timestamp_mapper:
      #     passthrough_keys: [utmos_mos, sigmos_noise, sigmos_ovrl]
      timestamp_mapper: {}

  - _target_: nemo_curator.stages.audio.io.convert.AudioToDocumentStage

  - _target_: nemo_curator.stages.text.io.writer.JsonlWriter
    path: ${output_dir}
    write_kwargs:
      force_ascii: false
